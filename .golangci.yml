run:
  timeout: 5m
  tests: true

linters-settings:
  goimports:
    local-prefixes: github.com/gforce/gforce
  govet:
    enable-all: true
  errcheck:
    check-type-assertions: true
    check-blank: true
  exhaustive:
    default-signifies-exhaustive: true
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
          - sayRepetitiveInsteadOfStutters
  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - gocritic
    - revive
    - exhaustive
    - noctx
    - bodyclose
    - contextcheck
    - wrapcheck
    - misspell
    - prealloc
    - unconvert

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - wrapcheck
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0

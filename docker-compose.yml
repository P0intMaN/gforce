services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gforce
      POSTGRES_PASSWORD: gforce
      POSTGRES_DB: gforce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gforce"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

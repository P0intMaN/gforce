image:
  repository: gforce
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

server:
  port: 8080
  sshPort: 2222
  baseURL: "http://localhost:8080"
  logLevel: debug
  gitStoragePath: /data/repos
  sshHostKeyPath: /data/host_key
  jwtSecret: "change-me-in-production"

operator:
  enabled: true
  replicaCount: 1

postgresql:
  enabled: true
  auth:
    username: gforce
    password: gforce
    database: gforce
  primary:
    persistence:
      size: 10Gi

persistence:
  enabled: true
  storageClass: standard
  size: 10Gi
  accessMode: ReadWriteOnce
  mountPath: /data

ingress:
  enabled: false
  host: git.example.com
  tls: false

serviceAccount:
  create: true
  name: gforce

rbac:
  create: true

resources:
  server:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  operator:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/gforce/gforce
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gforce.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /var/lib/gforce/repos

postgresql:
  enabled: true
  auth:
    database: gforce
    username: gforce
    existingSecret: gforce-db-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password

config:
  server:
    port: 8080
    readTimeoutSecs: 30
    writeTimeoutSecs: 30
  db:
    maxOpenConns: 25
    maxIdleConns: 5
  git:
    storagePath: /var/lib/gforce/repos
  auth:
    tokenTTLMinutes: 60
  log:
    level: info
  kubernetes:
    namespace: gforce-system

existingSecret: ""
jwtSecretKey: jwt-secret
dbDsnKey: db-dsn

nodeSelector: {}
tolerations: []
affinity: {}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gforce.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gforce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gforce.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "gforce.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gforce.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: GFORCE_SERVER_PORT
              value: {{ .Values.config.server.port | quote }}
            - name: GFORCE_LOG_LEVEL
              value: {{ .Values.config.log.level | quote }}
            - name: GFORCE_GIT_STORAGE_PATH
              value: {{ .Values.config.git.storagePath | quote }}
            - name: GFORCE_AUTH_TOKEN_TTL_MINUTES
              value: {{ .Values.config.auth.tokenTTLMinutes | quote }}
            - name: GFORCE_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (include "gforce.fullname" .) }}
                  key: {{ .Values.dbDsnKey }}
            - name: GFORCE_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (include "gforce.fullname" .) }}
                  key: {{ .Values.jwtSecretKey }}
          volumeMounts:
            - name: repo-storage
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: repo-storage
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "gforce.fullname" . }}-repos
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
